name: Dashboard rebake

on:
  schedule:
    # Every 30 min, Mon–Fri, 11:00–21:00 UTC (07:00–17:00 ET)
    - cron: "0,30 11-21 * * 1-5"
  workflow_dispatch:        # allow manual trigger from GitHub Actions UI

permissions:
  contents: write

jobs:
  rebake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Run rebake script
        id: rebake
        env:
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
        run: |
          MSG=$(python3 scripts/rebake.py)
          echo "msg=$MSG" >> "$GITHUB_OUTPUT"

      - name: Commit and push if changed
        if: steps.rebake.outputs.msg != 'NO_CHANGE'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "${{ steps.rebake.outputs.msg }}"
          git push origin main
