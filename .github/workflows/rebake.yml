name: Dashboard rebake

on:
  schedule:
    # Every 30 min, Mon–Fri, 11:00–21:00 UTC (07:00–17:00 ET)
    - cron: "0,30 11-21 * * 1-5"
  workflow_dispatch:        # allow manual trigger from the Actions UI

permissions:
  contents: write
  issues: write

concurrency:                # never let two rebakes race on main
  group: dashboard-rebake
  cancel-in-progress: false

jobs:
  rebake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Self-test rebuild logic (no network)
        run: python3 scripts/rebake.py --selftest

      - name: Run rebake
        id: rebake
        env:
          INSTANTLY_API_KEY: ${{ secrets.INSTANTLY_API_KEY }}
        run: |
          set -o pipefail
          python3 scripts/rebake.py | tee /tmp/rebake.out
          echo "msg=$(tail -n1 /tmp/rebake.out)" >> "$GITHUB_OUTPUT"

      - name: Commit and push if index.html changed
        run: |
          if git diff --quiet -- index.html; then
            echo "No change to index.html — nothing to commit."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "${{ steps.rebake.outputs.msg }}"
          git push origin main

      - name: Open/append a failure issue
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const title = "⚠️ Dashboard rebake workflow is failing";
            const run = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `The scheduled **Dashboard rebake** failed.`,
              ``,
              `- Run: ${run}`,
              `- Commit: \`${context.sha}\``,
              `- When: ${new Date().toISOString()}`,
              ``,
              `Check the failed step's log (the script prints \`API_ERROR <code> ...\` with the upstream message). ` +
              `\`index.html\` is left untouched on failure. Close this issue once it's green again.`,
            ].join("\n");
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner, repo: context.repo.repo, state: "open", per_page: 100,
            });
            const existing = issues.find(i => i.title === title && !i.pull_request);
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo, issue_number: existing.number, body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner, repo: context.repo.repo, title, body,
              });
            }
